textColor = "#2d1b0e"
primaryColor = "#c0392b"
backgroundColor = "#fbe5e5"
secondaryBackgroundColor = "#f5d0c5"
showWidgetBorder = true
borderColor = "#e8b4a0"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
